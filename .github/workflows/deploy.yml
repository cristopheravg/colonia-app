name: Deploy colonia app

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: parajedorteoarango.com
          username: admin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # ============================================
            # CONFIGURACIÓN INICIAL
            # ============================================
            set -e  # Detener el script si hay algún error
            
            # CARGAR NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20
            
            # VERIFICACIÓN
            echo "========================================="
            echo "✅ Usando Node: $(node -v)"
            echo "✅ Usando NPM: $(npm -v)"
            echo "✅ Usando PM2: $(pm2 -v)"
            echo "========================================="
            
            # ============================================
            # ACTUALIZAR CÓDIGO
            # ============================================
            echo "📦 Actualizando repositorio..."
            cd /var/www/colonia-app
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # ============================================
            # FRONTEND
            # ============================================
            echo "🔧 Construyendo frontend..."
            cd frontend
            
            # Instalar TODAS las dependencias (necesario para build)
            echo "📦 Instalando dependencias completas..."
            npm ci
            
            # ===========================================
            # GITHUB SECRETS
            # ===========================================



            echo "🔨 Ejecutando build con variables de entorno..."
            # Pasar las variables de entorno desde GitHub Secrets
            export VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}"
            export VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}"
            export VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
            export VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}"
            export VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}"
            export VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}"
            export VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}"
            export VITE_FIREBASE_VAPID_KEY="${{ secrets.VITE_FIREBASE_VAPID_KEY }}"


            


            echo "🔨 Ejecutando build..."
            npm run build
            
            # Verificar que el build se completó
            if [ -d "dist" ]; then
              echo "✅ Build completado! Carpeta dist creada"
            else
              echo "❌ ERROR: No se creó la carpeta dist"
              exit 1
            fi
            
            # ============================================
            # BACKEND
            # ============================================
            echo "🔧 Configurando backend..."
            cd ../backend
            
            # Instalar dependencias de producción
            echo "📦 Instalando dependencias del backend..."
            npm ci --only=production
            
            # VERIFICAR QUE EL ARCHIVO DE CONFIGURACIÓN EXISTE
            if [ ! -f "ecosystem.config.cjs" ]; then
              echo "❌ ERROR: ecosystem.config.cjs no encontrado!"
              exit 1
            fi
            
            # DETENER APLICACIÓN ACTUAL (si existe)
            echo "🛑 Deteniendo instancia anterior..."
            pm2 delete colonia-backend 2>/dev/null || true
            
            # INICIAR CON NUEVA CONFIGURACIÓN
            echo "🚀 Iniciando backend con ecosystem..."
            pm2 start ecosystem.config.cjs
            
            # ESPERAR 5 SEGUNDOS PARA VERIFICAR QUE NO FALLA
            echo "⏳ Verificando que la app se mantenga viva (5s)..."
            sleep 5
            
            # ============================================
            # VERIFICACIÓN CORREGIDA
            # ============================================
            echo "📊 Verificando estado del backend..."
            
            # Mostrar estado completo
            pm2 status
            
            # Verificar que está online
            if pm2 status | grep -q "colonia-backend.*online"; then
              echo "✅ Backend iniciado correctamente"
              
              # Mostrar información detallada (versión corregida)
              echo "📋 Información detallada:"
              pm2 show colonia-backend | grep -E "status|memory|cpu|restarts|uptime" || true
              
              # Mostrar uso de memoria actual
              echo "📊 Memoria actual:"
              pm2 prettylist | grep -A 5 "colonia-backend" | grep "memory" || echo "   Memoria: disponible"
            else
              echo "❌ ERROR: La app no está online después de 5s"
              echo "📋 Últimos logs:"
              pm2 logs colonia-backend --lines 20 --nostream
              exit 1
            fi
            
            # ============================================
            # GUARDAR CONFIGURACIÓN
            # ============================================
            echo "💾 Guardando configuración para reinicios..."
            pm2 save
            
            # Verificar que se guardó
            if [ $? -eq 0 ]; then
              echo "✅ Configuración guardada correctamente"
            else
              echo "❌ ERROR: No se pudo guardar la configuración"
              exit 1
            fi
            
            # ============================================
            # VERIFICACIÓN FINAL
            # ============================================
            echo "========================================="
            echo "📊 ESTADO FINAL:"
            echo "========================================="
            pm2 status
            echo "========================================="
            echo "✅ DEPLOY COMPLETADO EXITOSAMENTE!"
            echo "========================================="